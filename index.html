<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Teacher Grading System | Quiz with Scoreboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="mode-toggle-container">
    <button class="mode-toggle-btn active" id="playModeBtn" aria-label="Play Mode">▶️ Play Mode</button>
    <button class="mode-toggle-btn" id="editModeBtn" aria-label="Edit Mode">✏️ Edit Mode</button>
</div>

<div class="builder-panel" id="builderPanel">
    <div class="section-title">✏️ Build Test</div>
    <div class="question-form">
        <div class="input-group"><label>📌 Question Text</label><input type="text" id="questionText" placeholder="e.g., What is capital of France?"></div>
        <div class="input-group"><label>🖼️ Attach Image (optional)</label><div class="image-upload-wrapper"><input type="file" id="questionImage" accept="image/*" class="image-input"><button type="button" id="uploadImageBtn" class="btn-upload">📤 Upload Image</button></div><div id="imagePreviewContainer"></div></div>
        <div class="input-group"><label>🎵 Attach Audio (optional)</label><div class="audio-upload-wrapper"><input type="file" id="questionAudio" accept="audio/*" class="audio-input"><button type="button" id="uploadAudioBtn" class="btn-upload">📤 Upload Audio</button></div><div id="audioPreviewContainer"></div></div>
        <div id="optionsGroup"><label>🔘 Options</label><div id="optionsContainer"></div><button type="button" class="btn-icon" id="addOptionBtn">+ Add Option</button></div>
        <div id="openAnswerGroup"><label>✏️ Correct Answers (reference)</label><textarea id="correctAnswers" rows="2"></textarea><div><input type="checkbox" id="caseSensitive"> <label>Case sensitive</label></div></div>
        <div id="sliderRangeGroup"><label>📊 Slider Range (integers)</label><div class="range-inputs"><input type="number" id="sliderMin" placeholder="Min"><span>to</span><input type="number" id="sliderMax" placeholder="Max"></div></div>
        <div class="type-toggle" id="typeToggleGroup"><div data-type="single" class="type-option active">Single</div><div data-type="multiple" class="type-option">Multiple</div><div data-type="open" class="type-option">Open</div><div data-type="slider" class="type-option">Slider</div></div>
        <div class="form-actions"><button class="btn-primary" id="saveQuestionBtn">➕ Save</button><button class="btn-secondary" id="clearFormBtn">🗑️ Clear</button></div>
    </div>
    <div class="questions-list-header">📋 Questions</div>
    <div id="questionsListArea" class="questions-list"></div>
    <div class="participant-management"><div class="section-title large">👥 Participants</div><div class="participant-input-wrapper"><input type="text" id="newParticipantName" placeholder="Name / Number"><button id="addParticipantBtn" class="btn-sm">➕ Add</button></div><div id="participantsList" class="participants-list-sidebar"></div></div>
    <button id="resetAllQuestionsBtn" class="btn-danger">🗑️ Reset All Questions</button>
    <button id="resetAllScoresBtn" class="btn-danger">🔄 Reset All Scores</button>
    
    <div class="section-title large">💾 Data Management</div>
    <button id="exportBtn" class="btn-primary">💾 Export Quiz</button>
    <button id="importLocalBtn" class="btn-secondary">📂 Import Local File</button>
    <input type="file" id="importFile" accept=".json">
</div>

<div class="main-content" id="mainContent">
    <div class="app-container">
        <div class="quiz-main"><div class="preview-panel"><div class="section-title">🎯 Quiz</div><div id="slideQuizContainer"></div></div></div>
    </div>
</div>

<div id="gradingSection" class="grading-section">
    <div id="gradingSectionInfo" class="grading-section-info"></div>
    <div class="grading-section-body">
        <label>👥 Select Participant & Points</label>
        <div id="participantsPointsList" class="participants-points-list"></div>
    </div>
</div>

<div id="scoreboard" class="scoreboard" aria-label="Scoreboard"><div class="scoreboard-header"><h3>🏆 LIVE SCOREBOARD</h3><button id="closeScoreboardBtn" class="close-scoreboard" aria-label="Close scoreboard">✕</button></div><div class="scoreboard-tabs" role="tablist"><button class="tab-btn active" data-tab="rankings" role="tab">🏅 Rankings</button><button class="tab-btn" data-tab="details" role="tab">📊 Details</button><button class="tab-btn" data-tab="stats" role="tab">📈 Stats</button></div><div id="rankingsTab" class="tab-content active" role="tabpanel"><div class="search-wrapper"><input type="text" id="searchParticipant" placeholder="🔍 Search"><select id="sortBySelect"><option value="score">Sort by Score</option><option value="name">Sort by Name</option></select></div><div id="rankingsList"></div></div><div id="detailsTab" class="tab-content" role="tabpanel"><select id="participantSelectDetail"><option value="">Select Participant</option></select><div id="participantDetailView"></div></div><div id="statsTab" class="tab-content" role="tabpanel"><div id="statsContent"></div></div><div class="scoreboard-footer"><button id="resetScoresBtn" class="btn-sm">Reset Scores</button></div></div>
<button id="toggleScoreboardBtn" class="scoreboard-toggle">📊 Show Scoreboard 🏆</button>

<script src="app.js"></script>
</body>
</html>
