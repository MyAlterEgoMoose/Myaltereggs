<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Teacher Grading System | Quiz with Scoreboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle menu">☰</button>
<div class="overlay" id="overlay"></div>

<div class="builder-panel" id="builderPanel">
    <button class="close-sidebar" id="closeSidebarBtn" aria-label="Close sidebar">✕</button>
    <div class="section-title">✏️ Build Test</div>
    <div class="question-form">
        <div class="input-group"><label>📌 Question Text</label><input type="text" id="questionText" placeholder="e.g., What is capital of France?"></div>
        <div class="input-group"><label>🖼️ Attach Image (optional)</label><div class="image-upload-wrapper"><input type="file" id="questionImage" accept="image/*" class="image-input"><button type="button" id="uploadImageBtn" class="btn-upload">📤 Upload Image</button></div><div id="imagePreviewContainer"></div></div>
        <div id="optionsGroup"><label>🔘 Options</label><div id="optionsContainer"></div><button type="button" class="btn-icon" id="addOptionBtn">+ Add Option</button></div>
        <div id="openAnswerGroup" style="display:none;"><label>✏️ Correct Answers (reference)</label><textarea id="correctAnswers" rows="2"></textarea><div><input type="checkbox" id="caseSensitive"> <label>Case sensitive</label></div></div>
        <div id="sliderRangeGroup" style="display:none;"><label>📊 Slider Range (integers)</label><div style="display:flex;gap:0.5rem;align-items:center;"><input type="number" id="sliderMin" placeholder="Min" style="flex:1;"><span>to</span><input type="number" id="sliderMax" placeholder="Max" style="flex:1;"></div></div>
        <div class="type-toggle" id="typeToggleGroup"><div data-type="single" class="type-option active">Single</div><div data-type="multiple" class="type-option">Multiple</div><div data-type="open" class="type-option">Open</div><div data-type="slider" class="type-option">Slider</div></div>
        <div class="form-actions"><button class="btn-primary" id="saveQuestionBtn">➕ Save</button><button class="btn-secondary" id="clearFormBtn">🗑️ Clear</button></div>
    </div>
    <div class="questions-list-header">📋 Questions</div>
    <div id="questionsListArea" class="questions-list"></div>
    <div class="participant-management"><div class="section-title" style="font-size:1.2rem;">👥 Participants</div><div style="display:flex; gap:0.5rem;"><input type="text" id="newParticipantName" placeholder="Name / Number"><button id="addParticipantBtn" class="btn-sm">➕ Add</button></div><div id="participantsList" class="participants-list-sidebar"></div></div>
    <button id="resetAllQuestionsBtn" class="btn-danger">🗑️ Reset All Questions</button>
    <button id="resetAllScoresBtn" class="btn-danger" style="margin-top:0.5rem; background:#dc3545;">🔄 Reset All Scores</button>
    
    <div class="section-title" style="font-size:1.2rem;margin-top:1rem;">⚙️ Settings</div>
    <div class="input-group"><label>GitHub Owner</label><input type="text" id="githubOwner" placeholder="your-username"></div>
    <div class="input-group"><label>GitHub Repo</label><input type="text" id="githubRepo" placeholder="your-repo-name"></div>
    <div class="input-group"><label>GitHub Token (fine-grained PAT)</label><input type="password" id="githubToken" placeholder="ghp_..."></div>
    <button id="saveGithubSettingsBtn" class="btn-primary" style="width:100%;margin-top:0.5rem;">💾 Save GitHub Settings</button>
</div>

<div class="main-content">
    <div class="app-container">
        <div class="toolbar"><button class="btn-export" id="exportBtn">💾 Export</button><button class="btn-secondary" id="shuffleBtn">🔀 Shuffle Questions</button><label class="file-input-label" for="importFile">📂 Import</label><input type="file" id="importFile" accept=".json"></div>
        <div class="quiz-main"><div class="preview-panel"><div class="section-title">🎯 Quiz</div><div id="slideQuizContainer"></div></div></div>
    </div>
</div>

<div id="gradingModal" class="modal fullscreen-module" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content fullscreen-content">
        <div class="modal-header module-header">
            <h2 id="modalTitle">📝 Grade Answer</h2>
            <span class="modal-close" aria-label="Close">&times;</span>
        </div>
        <div id="modalQuestionInfo" class="modal-body"></div>
        <div class="modal-body">
            <div class="participant-buttons-container">
                <label>👤 Select Participant & Points</label>
                <div id="participantButtonsList" class="participant-buttons-list"></div>
            </div>
            <div class="input-group" style="margin-top:1rem;">
                <label>📝 Notes (optional)</label>
                <textarea id="modalNotes" rows="2"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button id="modalCancelBtn" class="btn-secondary">Cancel</button>
        </div>
    </div>
</div>

<div id="scoreboard" class="scoreboard" aria-label="Scoreboard"><div class="scoreboard-header"><h3>🏆 LIVE SCOREBOARD</h3><button id="closeScoreboardBtn" class="close-scoreboard" style="background:none; border:none; color:white; font-size:1.5rem;" aria-label="Close scoreboard">✕</button></div><div class="scoreboard-tabs" role="tablist"><button class="tab-btn active" data-tab="rankings" role="tab">🏅 Rankings</button><button class="tab-btn" data-tab="details" role="tab">📊 Details</button><button class="tab-btn" data-tab="stats" role="tab">📈 Stats</button></div><div id="rankingsTab" class="tab-content active" role="tabpanel"><div style="display:flex; gap:0.5rem; margin-bottom:1rem;"><input type="text" id="searchParticipant" placeholder="🔍 Search"><select id="sortBySelect"><option value="score">Sort by Score</option><option value="name">Sort by Name</option></select></div><div id="rankingsList"></div></div><div id="detailsTab" class="tab-content" role="tabpanel"><select id="participantSelectDetail" style="width:100%; padding:0.5rem; border-radius:1rem;"><option value="">Select Participant</option></select><div id="participantDetailView"></div></div><div id="statsTab" class="tab-content" role="tabpanel"><div id="statsContent"></div></div><div class="scoreboard-footer"><button id="resetScoresBtn" class="btn-sm" style="background:#dc3545;">Reset Scores</button></div></div>
<button id="toggleScoreboardBtn" class="scoreboard-toggle">📊 Show Scoreboard 🏆</button>

<script src="app.js"></script>
</body>
</html>
